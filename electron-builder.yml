appId: com.formvault.app
productName: FormVault
directories:
  output: release
  buildResources: build

# REQUIRED before shipping: replace owner/repo with your actual GitHub repository. This is what
# electron-updater (electron/autoUpdate.ts) checks against for new releases — without a real
# repo here, auto-update silently finds nothing and users never get patched. Publishing a build
# with `electron-builder --publish always` (or a GITHUB_TOKEN env var set) uploads the installer
# plus the latest.yml feed file electron-updater reads.
publish:
  provider: github
  owner: Y45H-GitHub
  repo: form-vault
  # electron-builder defaults to publishing as a draft, which stays invisible to users and to
  # auto-update until someone manually clicks "Publish release" on GitHub. v0.1.0 needed that
  # manual step; this makes every future `--publish always` go live immediately.
  releaseType: release

# better-sqlite3 ships prebuilt binaries that already match Electron's ABI via
# postinstall (electron-builder install-app-deps). uiohook-napi/robotjs need
# Visual Studio Build Tools to compile from source, which may not be present on
# every dev machine — don't hard-fail packaging when that rebuild step can't run.
npmRebuild: false

files:
  - out/**/*
  - package.json

extraResources:
  - from: assets
    to: assets

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.png
  artifactName: '${productName}-Setup-${version}.${ext}'

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FormVault

mac:
  target: dmg
  icon: assets/icon.png
  category: public.app-category.productivity

linux:
  target: AppImage
  icon: assets/icon.png
  category: Utility
